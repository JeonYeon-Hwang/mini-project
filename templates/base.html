<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>{% block title %}뭐먹지{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/css">
    </style>
    <script src="{{ url_for('static', filename='js/card.js') }}"></script>
</head>

<body class="bg-gray-100 text-gray-900">
    <div class="min-h-screen">
        <div class="max-w-6xl mx-auto px-4 py-5">
            <!--상단 바.!-->
            <header class="sticky top-0 z-40 -mx-4 px-4 py-5 bg-gray-100/80 backdrop-blur border-b border-gray-200">
                <div class="max-w-6xl mx-auto px-4 py-3">
                    <div class="flex items-center gap-2">
                        <!--전체-->
                        <button
                            type="button"
                            onclick="location.href='/'"
                            class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent
                                {% if not request.args.get('category') %}bg-white border-gray-200 shadow-sm{% endif %}">
                            전체
                        </button>
                        <!-- 카테고리 -->
                        <nav id="categoryScroll" class="flex items-center gap-2 sm:gap-3 overflow-x-auto whitespace-nowrap
                            [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden ">
                            <button
                                type="button"
                                onclick="location.href='/?category=돈까스·회·일식'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '돈까스·회·일식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                돈까스·회·일식
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=피자'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '피자' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                피자
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=고기·구이'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '고기·구이' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                고기·구이
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=양식'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '양식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                양식
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=치킨'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '치킨' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                치킨
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=중식'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '중식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                중식
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=패스트푸드'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '패스트푸드' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                패스트푸드
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=분식'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '분식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                분식
                            </button>

                            <button
                                type="button"
                                onclick="location.href='/?category=도시락'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '도시락' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                도시락
                            </button>
                        </nav>
                        <!--로그인 자리-->
                        <div class="flex items-center justify-end">
                            {% if user %}
                            <div class="flex items-center gap-3">
                                <span class="title px-5 py-4 w-48 break-words text-2xl text-center font-bold text-grey-900 bg-grey-500 rounded-full">
                                    553dddddddddd333님
                                </span>

                                <form method="post" action="{{ url_for('logout') }}">
                                    <button
                                        type="submit"
                                        class="whitespace-nowrap px-4 py-3 text-xl font-semibold text-white bg-gray-800 rounded-lg hover:bg-gray-700 transition">
                                        로그아웃
                                    </button>
                                </form>

                                {% else %}

                                <button
                                    type="button"
                                    id="openLoginBtn"
                                    onclick="document.getElementById('loginModal').showModal()"
                                    class="whitespace-nowrap whitespace-nowrappx-4 px-4 py-3 text-xl font-semibold text-white bg-gray-900 rounded-lg hover:bg-gray-800">
                                    로그인
                                </button>

                            {% endif %}
                        </div>
                    </div>
                </div>
            </header>
            

            <!--모달(로그인)-->
            <dialog id="loginModal" class="p-0">
                <form method="dialog" class="p-0">
                    <div class="w-[min(92vw,420px)] rounded-2xl bg-white p-6 shadow-xl">
                        <div class="mb-4 flex items-center justify-between">
                            <h2 class="text-lg font-semibold">로그인</h2>
                            <button type="submit" class="rounded-md p-2 hover:bg-zinc-100">✕</button>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm text-zinc-700">아이디</label>
                            <input name="id_give" class="w-full rounded-lg border px-3 py-2 outline-none focus:ring" />
                        </div>
                        <div>
                            <label class="mb-1 block text-sm text-zinc-700">비밀번호</label>
                            <input type="password" name="pw_give"
                                class="w-full rounded-lg border px-3 py-2 outline-none focus:ring" />
                        </div>
                        <button type="button" onclick="login()"
                            class="mt-2 w-full rounded-lg bg-black py-2 text-white hover:bg-zinc-800">로그인</button>
                        <button type="button" class="w-full rounded-lg border py-2 hover:bg-zinc-50"
                            onclick="document.getElementById('loginModal').close(); document.getElementById('signinModal').showModal()">
                            회원가입
                        </button>
                    </div>
                </form>
            </dialog>

            <!--모달(회원가입)-->
            <dialog id="signinModal" class="p-0">
                <form method="dialog" class="p-0">
                    <div class="w-[min(92vw,420px)] rounded-2xl bg-white p-6 shadow-xl">
                        <div class="mb-4 flex items-center justify-between">
                            <h2 class="text-lg font-semibold">회원가입</h2>
                            <button type="submit" class="rounded-md p-2 hover:bg-zinc-100">✕</button>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm text-zinc-700">아이디</label>
                            <input name="id_give" class="w-full rounded-lg border px-3 py-2 outline-none focus:ring" />
                        </div>
                        <div>
                            <label class="mb-1 block text-sm text-zinc-700">비밀번호</label>
                            <input type="password" name="pw_give"
                                class="w-full rounded-lg border px-3 py-2 outline-none focus:ring" />
                        </div>
                        <div>
                            <label class="mb-1 block text-sm text-zinc-700">닉네임</label>
                            <input name="nickname_give"
                                class="w-full rounded-lg border px-3 py-2 outline-none focus:ring" />
                        </div>
                        <div>
                            <label class="mb-1 block text-sm text-zinc-700">Slack URL</label>
                            <input name="slack_url_give"
                                class="w-full rounded-lg border px-3 py-2 outline-none focus:ring" />
                        </div>
                        <button type="button" onclick="signin()"
                            class="mt-2 w-full rounded-lg bg-black py-2 text-white hover:bg-zinc-800">가입</button>
                    </div>
                </form>
            </dialog>

            <!--페이지별 콘텐츠-->
            {% block content %}{% endblock %}

        </div>
    </div>

    <script>
        async function login() {
            const id = document.querySelector("#loginModal input[name='id_give']").value.trim();
            const pw = document.querySelector("#loginModal input[name='pw_give']").value;
            if (!id || !pw) { alert("아이디/비밀번호를 입력해주세요!"); return; }
            try {
                const formData = new FormData();
                formData.append('id_give', id);
                formData.append('pw_give', pw);

                const res = await fetch("/food/login", {
                    method: "POST",
                    body: formData,
                });
                const data = await res.json();
                if (data.result === "success") { location.reload(); }
                else { alert(data.message || "로그인 실패"); }
            } catch (e) {
                console.error(e);
                alert("서버 통신 오류");
            }
        }

        async function signin() {
            const id = document.querySelector("#signinModal input[name='id_give']").value.trim();
            const pw = document.querySelector("#signinModal input[name='pw_give']").value;
            const nickname = document.querySelector("#signinModal input[name='nickname_give']").value.trim();
            const slack = document.querySelector("#signinModal input[name='slack_url_give']").value.trim();

            if (!id || !pw || !nickname || !slack) {
                alert("모든 필드를 입력해주세요!");
                return;
            }

            try {
                const formData = new FormData();
                formData.append('id_give', id);
                formData.append('pw_give', pw);
                formData.append('nickname_give', nickname);
                formData.append('slack_url_give', slack);

                const res = await fetch("/food/signin", {
                    method: "POST",
                    body: formData,
                });
                const data = await res.json();
                if (data.result === "success") {
                    alert("회원가입 완료!");
                    document.getElementById("signinModal").close();
                    document.getElementById("signinModal").querySelectorAll("input").forEach(input => input.value = "");
                } else {
                    alert(data.message || "회원가입 실패");
                }
            } catch (e) {
                console.error(e);
                alert("서버 통신 오류");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            startCountdowns()
        })
    </script>

    {% block scripts %}{% endblock %}

</body>

</html>
