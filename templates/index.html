<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>미니프로젝트 | 뭐먹지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/css">
    </style>
    <script src="{{ url_for('static', filename='js/card.js') }}"></script>
</head>

<body class="bg-gray-100 text-gray-900">
    <div class="min-h-screen">
        <div class="max-w-6xl mx-auto px-4 py-5">
            <!--상단 바-->
            <header class="sticky top-0 z-40 -mx-4 px-4 py-3 bg-gray-100/80 backdrop-blur border-b border-gray-200">
                <div class="flex items-start justify-between gap-4">
                    <!-- 왼쪽: 카테고리 -->
                    <nav class="flex items-center gap-2 sm:gap-3 overflow-x-auto">
                        <button
                            type="button"
                            onclick="location.href='/'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent
                                {% if not request.args.get('category') %}bg-white border-gray-200 shadow-sm{% endif %}">
                            전체
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=돈까스·회·일식'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '돈까스·회·일식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            돈까스·회·일식
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=피자'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '피자' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            피자
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=고기·구이'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '고기·구이' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            고기·구이
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=양식'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '양식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            양식
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=치킨'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '치킨' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            치킨
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=중식'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '중식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            중식
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=패스트푸드'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '패스트푸드' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            패스트푸드
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=분식'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '분식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            분식
                        </button>

                        <button
                            type="button"
                            onclick="location.href='/?category=도시락'"
                            class="px-3 py-2 rounded-xl text-3xl font-bold text-gray-900 whitespace-nowrap
                                hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                {% if request.args.get('category') == '도시락' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                            도시락
                        </button>
                    </nav>

                    <!-- 오른쪽: 로그인-->
                    <div class="relative shrink-0">
                        {% if user %}
                            <button
                                type="button"
                                id="userMenuBtn"
                                class="inline-flex items-center gap-2 px-3 py-2 rounded-xl bg-white border border-gray-200
                                    shadow-sm hover:shadow-md transition">
                                <span class="text-sm sm:text-base font-semibold">{{ user.name }}</span>
                                <svg class="w-4 h-4 text-gray-500" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 10.94l3.71-3.71a.75.75 0 1 1 1.06 1.06l-4.24 4.24a.75.75 0 0 1-1.06 0L5.21 8.29a.75.75 0 0 1 .02-1.08z" clip-rule="evenodd"/>
                                </svg>
                            </button>



                            <!-- 드롭다운 -->
                            <div
                                id="userMenu"
                                class="hidden absolute right-0 mt-2 w-44 rounded-xl bg-white border border-gray-200 shadow-lg overflow-hidden">
                                <form method="post" action="{{ url_for('logout') }}">
                                <button type="submit" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50">
                                    로그아웃
                                </button>
                                </form>
                            </div>
                        {% else %}
                            <button
                                type="button"
                                id="openLoginBtn"
                                class="px-4 py-2 rounded-xl bg-gray-900 text-white text-sm sm:text-base font-semibold
                                    hover:bg-gray-800 transition shadow-sm"
                                onclick="document.getElementById('loginModal').showModal()">
                                로그인
                            </button>
                        {% endif %}
                    </div>
                </div>
            </header>

            <!--모달(로그인)-->
            <dialog id="loginModal" class="p-0">
                <form method="dialog" class="p-0">
                    <div class="flex flex-col w-[min(92vw,420px)] p-6 gap-4 bg-white rounded-2xl shadow-xl">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold">로그인</h2>
                            <button 
                                type="button"
                                class="p-2 hover:bg-zinc-100 rounded-md"
                                onclick="closeModal(document.getElementById('loginModal'))">
                                ✕
                            </button>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-sm text-zinc-700">아이디</label>
                            <input id="id_login" class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring"/>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-sm text-zinc-700">비밀번호</label>
                            <input type="password" id="pw_login" class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring"/>
                        </div>

                        <div>
                            <button 
                                type="button" 
                                class="flex items-center justify-center w-full py-2 text-sm font-semibold text-white bg-black rounded-lg hover:bg-zinc-800 transition"
                                onclick="login2()">
                                로그인
                            </button>
                        </div>

                        <div>
                            <button
                                type="button"
                                class="flex items-center justify-center w-full py-2 text-sm font-semibold bg-white border border-zinc-200 rounded-lg hover:bg-zinc-50 transition"
                                onclick="closeModal(document.getElementById('loginModal')); document.getElementById('signinModal').showModal()">
                                회원가입
                            </button>
                        </div>
                    </div>
                </form>
            </dialog>

            <!--모달(회원가입)-->
            <dialog id="signinModal" class="p-0">
                <form method="dialog" class="p-0">
                    <div class="flex flex-col w-[min(92vw,420px)] p-6 gap-4 bg-white rounded-2xl shadow-xl">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold">회원가입</h2>
                            <button 
                                type="button" 
                                class="p-2 hover:bg-zinc-100 rounded-md"
                                onclick="closeModal(document.getElementById('signinModal'))">
                                ✕
                            </button>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-sm text-zinc-700">아이디</label>
                            <input id="id_signin" class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring"/>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-sm text-zinc-700">비밀번호</label>
                            <input type="password" id="pw_signin" class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring"/>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="mb-1 block text-sm text-zinc-700">닉네임</label>
                            <input id="nickname_signin" class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring"/>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="mb-1 block text-sm text-zinc-700">Slack URL</label>
                            <input id="slack_url_signin" class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring"/>
                        </div>

                        <button 
                            type="button"
                            class="flex items-center justify-center w-full py-2 text-sm font-semibold text-white bg-black rounded-lg hover:bg-zinc-800 transition"
                            onclick="signin2()">
                            가입
                        </button>
                    </div>
                </form>
            </dialog>







            <!--카드 그리드-->
            <div class="mt-5 grid grid -cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for card in cards %}
                    {% include 'card.html' %}
                {% endfor %}
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        //로그인
        function login2() {

            let id = $('#id_login').val();
            let pw = $('#pw_login').val();

            $.ajax({
                type: 'POST',
                url: '/food/login',
                data: { id_give: id,
                        pw_give: pw
                },
                success: function (response) {
                    if (response['result'] == 'success'){
                        alert('로그인 성공')

                        const modal = document.getElementById("loginModal");
                        closeModal(modal);
                    }
                    else {
                        alert('로그인 실패!')
                    }
                }
            });
        }

        //회원가입
        function signin2() {
            let id =$('#id_signin').val();
            let pw =$('#pw_signin').val();
            let nickname =$('#nickname_signin').val();
            let slack_url =$('#slack_url_signin').val();

            $.ajax({
                type: 'POST',
                url: '/food/signin',
                data: { id_give: id,
                        pw_give: pw,
                        nickname_give: nickname,
                        slack_url_give: slack_url
                },
                success: function (response) {
                    if (response['result'] == 'success'){
                        alert('회원가입 성공')

                        const modal = document.getElementById("signinModal");
                        closeModal(modal);
                    }
                    else {
                        alert('회원가입 실패!')
                    }
                }
            });
        }

        //modal close, form reset
        function closeModal(modalEl) {
            modalEl.close();
            modalEl.querySelectorAll("form").forEach(form => form.reset());
        }

        //paegnation
        const grid = document.getElementById("cardsGrid");  //카드 그리드 div
        const sentinel = document.getElementById("scrollSentinel"); //감지용 div
        const nextCursor = document.getElementById("nextCursor"); //다음 cursor!

        const spinner = document.getElementById("loadingSpinner");  //로딩 표시!!
        const noMore = document.getElementById("noMoreCards");  //끝 표시!!

        let loading = false;
        let hasMore = true;
        // let snapshotTime = {{ snapshot_time | tojson}};

        // nextCursor.value= {{ cursor | tojson}};

        //$(document).ready(function(){
        //    loadMore();
        //});

        async function loadMore(){
            //noCard
            if (nextCursor.value == "noCard") { hasMore = false; }

            //로딩중이다
            if (loading) return;

            //이제 없다구요ㅜ
            if (!hasMore) {
                noMore.classList.remove("hidden");
                return;
            }

            const cursor = nextCursor.value;

            //로딩 시작
            loading = true;
            spinner.classList.remove("hidden");

            //새 카드 요청
            const params = new URLSearchParams();
            if (cursor) params.set("cursor", cursor);
            if (snapshotTime) params.set("as_of", snapshotTime);

            const url = `/food/cards?${params.toString()}`;

            const res = await fetch(url, { method: "GET", credentials: "include" });

            if (!res.ok) {
                console.error(await res.text());
                return;
            }
            const data = await res.json();

            if (data.result === "success" && data.html) {
                grid.insertAdjacentHTML("beforeend", data.html);
                nextCursor.value = data.next_cursor || "";
                hasMore = !!(data.has_more && data.next_cursor);
            } 
            else {
                hasMore = false;
            }

            loading = false;
            spinner.classList.add("hidden");
        }
        //감지 시작
        const io = new IntersectionObserver((entries)=>{if(entries[0].isIntersecting) loadMore();}, { rootMargin: "300px" });

        io.observe(sentinel);

    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            startCountdowns()
        })
    </script>
</body>

</html>
