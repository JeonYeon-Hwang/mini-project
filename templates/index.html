<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>미니프로젝트 | 뭐먹지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/css">
    </style>
    <script src="{{ url_for('static', filename='js/card.js') }}"></script>
</head>

<body class="bg-gray-100 text-gray-900">
    <div class="min-h-screen">
        <div class="max-w-6xl mx-auto px-4 py-5">
            <!--상단 바.!-->
            <header class="sticky top-0 z-40 -mx-4 px-4 py-5 bg-gray-100/80 backdrop-blur border-b border-gray-200">
                <div class="max-w-6xl mx-auto px-4 py-3">

                            <button type="button" onclick="location.href='/?category=돈까스·회·일식'"

                                돈까스·회·일식
                            </button>

                            <button type="button" onclick="location.href='/?category=피자'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '피자' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                피자
                            </button>

                            <button type="button" onclick="location.href='/?category=고기·구이'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '고기·구이' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                고기·구이
                            </button>

                            <button type="button" onclick="location.href='/?category=양식'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '양식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                양식
                            </button>

                            <button type="button" onclick="location.href='/?category=치킨'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '치킨' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                치킨
                            </button>

                            <button type="button" onclick="location.href='/?category=중식'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '중식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                중식
                            </button>

                            <button type="button" onclick="location.href='/?category=패스트푸드'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '패스트푸드' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                패스트푸드
                            </button>

                            <button type="button" onclick="location.href='/?category=분식'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '분식' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                분식
                            </button>

                            <button type="button" onclick="location.href='/?category=도시락'"
                                class="px-4 py-3 rounded-xl text-3xl font-bold bg-gray-200 text-gray-900 border border-transparent whitespace-nowrap
                                    hover:bg-white hover:shadow-sm border border-transparent text-gray-700 hover:text-gray-900
                                    {% if request.args.get('category') == '도시락' %}bg-white text-gray-900 border-gray-200 shadow-sm{% endif %}">
                                도시락
                            </button>
                        </nav>
                        <!--로그인 자리-->
                        <div class="flex items-center justify-end">
                            {% if user %}
                            <div class="flex items-center gap-3">
                                <button type="button" onclick="location.href='/food/card/mylist'"
                                    class="title px-5 py-4 w-48 break-words text-2xl text-center font-bold text-grey-900 bg-grey-500 rounded-full">
                                    {{ user.nickname }} 님
                                </button>

                                <form method="post" action="{{ url_for('logout') }}">
                                    <button type="submit"
                                        class="whitespace-nowrap px-4 py-3 text-xl font-semibold text-white bg-gray-800 rounded-lg hover:bg-gray-700 transition">
                                        로그아웃
                                    </button>
                                </form>

                                {% else %}

                                <button type="button" id="openLoginBtn"
                                    onclick="document.getElementById('loginModal').showModal()"
                                    class="whitespace-nowrap whitespace-nowrappx-4 px-4 py-3 text-xl font-semibold text-white bg-gray-900 rounded-lg hover:bg-gray-800">
                                    로그인
                                </button>

                                {% endif %}
                            </div>
                        </div>
                    </div>
            </header>

            <!--모달(로그인)-->
            <dialog id="loginModal" class="p-0">
                <form method="dialog" class="p-0">
                    <div class="flex flex-col w-[min(92vw,420px)] p-6 gap-4 bg-white rounded-2xl shadow-xl">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-2xl font-semibold">로그인</h2>
                            <button type="button" class="p-2 hover:bg-zinc-100 rounded-md"
                                onclick="closeModal(document.getElementById('loginModal'))">
                                ✕
                            </button>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-xl text-zinc-700">아이디</label>
                            <input id="id_login"
                                class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring" />
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-xl text-zinc-700">비밀번호</label>
                            <input type="password" id="pw_login"
                                class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring" />
                        </div>

                        <div>
                            <button type="button"
                                class="flex items-center justify-center w-full py-2 text-xl font-semibold text-white bg-black rounded-lg hover:bg-zinc-800 transition"
                                onclick="login2()">
                                로그인
                            </button>
                        </div>

                        <div>
                            <button type="button"
                                class="flex items-center justify-center w-full py-2 text-xl font-semibold bg-white border border-zinc-200 rounded-lg hover:bg-zinc-50 transition"
                                onclick="closeModal(document.getElementById('loginModal')); document.getElementById('signinModal').showModal()">
                                회원가입
                            </button>
                        </div>
                    </div>
                </form>
            </dialog>

            <!--모달(회원가입)-->
            <dialog id="signinModal" class="p-0">
                <form method="dialog" class="p-0">
                    <div class="flex flex-col w-[min(92vw,420px)] p-6 gap-4 bg-white rounded-2xl shadow-xl">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-2xl font-semibold">회원가입</h2>
                            <button type="button" class="p-2 hover:bg-zinc-100 rounded-md"
                                onclick="closeModal(document.getElementById('signinModal'))">
                                ✕
                            </button>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-xl text-zinc-700">아이디</label>
                            <input id="id_signin"
                                class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring" />
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="block mb-1 text-xl text-zinc-700">비밀번호</label>
                            <input type="password" id="pw_signin"
                                class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring" />
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="mb-1 block text-xl text-zinc-700">닉네임</label>
                            <input id="nickname_signin"
                                class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring" />
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="mb-1 block text-xl text-zinc-700">Slack URL</label>
                            <input id="slack_url_signin"
                                class="w-full px-3 py-2 text-sm bg-white border border-zinc-300 rounded-lg outline-none focus:ring" />
                        </div>

                        <button type="button"
                            class="flex items-center justify-center w-full py-2 text-xl font-semibold text-white bg-black rounded-lg hover:bg-zinc-800 transition"
                            onclick="signin2()">
                            가입
                        </button>
                    </div>
                </form>
            </dialog>

            <!--카드 그리드-->
            <div id="cards-box" class="mt-5 grid grid -cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for card in cards %}
                {% include 'card.html' %}
                {% endfor %}
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // 로그인
        function login2() {

            let id = $('#id_login').val();
            let pw = $('#pw_login').val();

            $.ajax({
                type: 'POST',
                url: '/food/login',
                data: {
                    id_give: id,
                    pw_give: pw
                },
                success: function (response) {
                    if (response['result'] == 'success') {
                        alert('로그인 성공')

                        location.reload();
                    }
                    else {
                        alert('로그인 실패!')
                    }
                }
            });
        }

        // BFCache에서 페이지 복원 시 새로고침 (로그인 상태 반영)
        window.addEventListener('pageshow', function (event) {
            if (event.persisted) {
                // BFCache에서 복원된 경우
                location.reload();
            }
        });

        //회원가입
        function signin2() {
            let id = $('#id_signin').val();
            let pw = $('#pw_signin').val();
            let nickname = $('#nickname_signin').val();
            let slack_url = $('#slack_url_signin').val();

            $.ajax({
                type: 'POST',
                url: '/food/signin',
                data: {
                    id_give: id,
                    pw_give: pw,
                    nickname_give: nickname,
                    slack_url_give: slack_url
                },
                success: function (response) {
                    if (response['result'] == 'success') {
                        alert('회원가입 성공')

                        const modal = document.getElementById("signinModal");
                        closeModal(modal);
                    }
                    else {
                        alert('회원가입 실패!')
                    }
                }
            });
        }

        //modal close, form reset
        function closeModal(modalEl) {
            modalEl.close();
            modalEl.querySelectorAll("form").forEach(form => form.reset());
        }

        //paegnation
        const grid = document.getElementById("cardsGrid");  //카드 그리드 div
        const sentinel = document.getElementById("scrollSentinel"); //감지용 div
        const nextCursor = document.getElementById("nextCursor"); //다음 cursor!

        const spinner = document.getElementById("loadingSpinner");  //로딩 표시!!
        const noMore = document.getElementById("noMoreCards");  //끝 표시!!

        let loading = false;
        let hasMore = true;
        // let snapshotTime = {{ snapshot_time | default(none) | tojson }};

        // nextCursor.value= {{ cursor | default(none) | tojson }};

        //$(document).ready(function(){
        //    loadMore();
        //});

        async function loadMore() {
            //noCard
            if (nextCursor.value == "noCard") { hasMore = false; }

            //로딩중이다
            if (loading) return;

            //이제 없다구요ㅜ
            if (!hasMore) {
                noMore.classList.remove("hidden");
                return;
            }

            const cursor = nextCursor.value;

            //로딩 시작
            loading = true;
            spinner.classList.remove("hidden");

            //새 카드 요청
            const params = new URLSearchParams();
            if (cursor) params.set("cursor", cursor);
            if (snapshotTime) params.set("as_of", snapshotTime);

            const url = `/food/cards?${params.toString()}`;

            const res = await fetch(url, { method: "GET", credentials: "include" });

            if (!res.ok) {
                console.error(await res.text());
                return;
            }
            const data = await res.json();

            if (data.result === "success" && data.html) {
                grid.insertAdjacentHTML("beforeend", data.html);
                nextCursor.value = data.next_cursor || "";
                hasMore = !!(data.has_more && data.next_cursor);
            }
            else {
                hasMore = false;
            }

            loading = false;
            spinner.classList.add("hidden");
        }
        //감지 시작
        const io = new IntersectionObserver((entries) => { if (entries[0].isIntersecting) loadMore(); }, { rootMargin: "300px" });

        io.observe(sentinel);

    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            startCountdowns()
        })

        let currentPage = 1;
        let isLoading = false;
        let isNotLimit = true;

        window.onscroll = function () {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                if (!isLoading && isNotLimit) {
                    console.log("스크롤 감지, 현재 페이지: " + currentPage)
                    loadMore();
                }
            }
        };

        function loadMore() {
            isLoading = true;
            let nextPage = currentPage + 1;

            fetch(`/food/show_more/${nextPage}`)
                .then(res => res.json())
                .then(data => {
                    if (data.result === 'success') {

                        const box = document.getElementById('cards-box');
                        if (box) {
                            data.cards.forEach(card => {
                                const html = createCardHTML(card);
                                box.insertAdjacentHTML('beforeend', html);
                            });

                            currentPage = nextPage;
                            isNotLimit = data.has_more;
                        } else {
                            console.error("아이디가 'cards-box'인 태그를 찾을 수 없어!");
                        }
                    }
                    isLoading = false;
                })
                .catch(err => {
                    console.error("로딩 에러:", err);
                    isLoading = false;
                });

        }
    </script>
    <!--카테고리 마우스 이동-->
    <script>
        const slider = document.getElementById("categoryScroll");

        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener("mousedown", (e) => {
            isDown = true;
            slider.classList.add("cursor-grabbing");
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        slider.addEventListener("mouseleave", () => {
            isDown = false;
            slider.classList.remove("cursor-grabbing");
        });

        slider.addEventListener("mouseup", () => {
            isDown = false;
            slider.classList.remove("cursor-grabbing");
        });

        slider.addEventListener("mousemove", (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5;
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>

    <!-- 플로팅 액션 버튼 (생성 버튼) -->
    <div class="fixed bottom-8 left-0 right-0 pointer-events-none z-50 flex justify-end max-w-6xl mx-auto px-4">
        {% if user %}
        <button onclick="openAddModal()"
            class="pointer-events-auto w-20 h-20 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white rounded-full shadow-2xl flex items-center justify-center transition-transform hover:scale-105 active:scale-95 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />

        </button>
        {% else %}
        <button onclick="document.getElementById('loginModal').showModal()"
            class="pointer-events-auto w-20 h-20 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white rounded-full shadow-2xl flex items-center justify-center transition-transform hover:scale-105 active:scale-95 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
        </button>
        {% endif %}
    </div>

    {% include "article_add.html" %}

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        const indexSocket = io();

        indexSocket.on('member_count_updated', data => {
            const { card_id, count } = data;
            const cardEl = document.querySelector(`[data-card-id="${card_id}"]`);
            if (cardEl) {
                const countEl = cardEl.querySelector('.member-count-display');
                if (countEl) countEl.textContent = count;
            }
        });

        indexSocket.on('card_deleted', data => {
            const { card_id } = data;
            const cardEl = document.querySelector(`[data-card-id="${card_id}"]`);
            if (cardEl) {
                cardEl.remove();
            }
        });

        indexSocket.on('card_created', async () => {
            const box = document.getElementById('cards-box');
            if (!box) return;

            // 현재 화면에 렌더된 카드 수 + 1 만큼 요청
            const currentCount = box.querySelectorAll('[data-card-id]').length;
            const fetchLimit = currentCount + 1;

            // 현재 카테고리 필터 유지
            const params = new URLSearchParams(window.location.search);
            const category = params.get('category') || '';

            const qs = new URLSearchParams({ limit: fetchLimit });
            if (category) qs.set('category', category);

            try {
                const res = await fetch(`/food/cards/refresh?${qs.toString()}`, {
                    method: 'GET',
                    credentials: 'include'
                });
                if (!res.ok) return;
                const data = await res.json();
                if (data.result !== 'success' || !data.cards) return;

                // cards-box 전체 교체
                box.innerHTML = data.cards.map(card => createCardHTML(card)).join('');
                startCountdowns();
            } catch (e) {
                console.error('card_created refresh failed:', e);
            }
        });
    </script>

</body>
